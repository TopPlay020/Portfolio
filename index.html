<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Beghdad Amine — Full Stack .NET Developer. Professional C# & .NET solutions for Windows and web: WPF, Blazor, ASP.NET, REST APIs and cloud deployment.">
    <meta name="theme-color" content="#0a0a0c">
    <meta property="og:title" content="Beghdad Amine - Full Stack .NET Developer Portfolio">
    <meta property="og:description"
        content="Professional C# & .NET solutions for Windows and web. Lightweight, fast, maintainable apps and sites with clean architecture, database access, and deployment.">
    <meta property="og:image" content="https://topplay020.github.io/Portfolio/Assets/preview.webp">
    <meta property="og:image:alt" content="Preview of Beghdad Amine Full Stack .NET Developer Portfolio">
    <meta property="og:url" content="https://topplay020.github.io/Portfolio/">
    <meta property="og:type" content="website">
    <title>Beghdad Amine - Full Stack .NET Developer Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Cairo:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="icon" href="Assets/favicon.ico" type="image/x-icon">
    <style>
        /* ============ Design tokens ============ */
        :root {
            --bg: #070709;
            --bg-2: #0c0c10;
            --card: #111116;
            --accent: #e63946;
            --accent-2: #ff6b54;
            --text: #f5f5f7;
            --muted: #9aa0ab;
            --border: rgba(255, 255, 255, .08);
            --glow: rgba(230, 57, 70, .35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            overflow-x: hidden;
        }

        ::selection {
            background: var(--accent);
            color: #000;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(var(--accent), var(--accent-2));
            border-radius: 6px;
            border: 2px solid var(--bg);
        }

        * {
            scrollbar-color: var(--accent) var(--bg);
            scrollbar-width: thin;
        }

        html[lang="ar"],
        html[lang="ar"] body {
            font-family: 'Cairo', sans-serif;
            direction: rtl;
            text-align: right;
        }

        html[lang="en"],
        html[lang="en"] body {
            font-family: 'Poppins', sans-serif;
            direction: ltr;
            text-align: left;
        }

        body {
            background: var(--bg);
            color: var(--text);
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Red accent inside headings — the "red block" motif from the portrait */
        .red {
            color: var(--accent);
            position: relative;
            background: linear-gradient(120deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ============ Noise + grain overlay ============ */
        .noise::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            opacity: .035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* ============ Preloader ============ */
        #preloader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            transition: opacity .6s ease, visibility .6s ease;
        }

        #preloader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-name {
            font-size: clamp(1.6rem, 5vw, 2.6rem);
            font-weight: 800;
            letter-spacing: .35em;
            text-transform: uppercase;
            display: flex;
        }

        .loader-name span {
            opacity: 0;
            animation: loaderLetter .5s ease forwards;
        }

        @keyframes loaderLetter {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loader-bar {
            width: 220px;
            height: 3px;
            background: #1d1d24;
            border-radius: 3px;
            overflow: hidden;
        }

        .loader-bar i {
            display: block;
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            border-radius: 3px;
            animation: loaderSlide 1.1s ease-in-out infinite;
        }

        @keyframes loaderSlide {
            0% {
                transform: translateX(-120%);
            }

            100% {
                transform: translateX(320%);
            }
        }

        html[lang="ar"] .loader-bar i {
            animation-name: loaderSlideRtl;
        }

        @keyframes loaderSlideRtl {
            0% {
                transform: translateX(120%);
            }

            100% {
                transform: translateX(-320%);
            }
        }

        /* ============ Scroll progress ============ */
        #scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            width: 0;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            z-index: 999;
            box-shadow: 0 0 12px var(--glow);
        }

        /* ============ Custom cursor ============ */
        #cursor-dot,
        #cursor-ring {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            border-radius: 50%;
            z-index: 998;
            transform: translate(-50%, -50%);
        }

        #cursor-dot {
            width: 7px;
            height: 7px;
            background: var(--accent);
        }

        #cursor-ring {
            width: 38px;
            height: 38px;
            border: 1.5px solid rgba(230, 57, 70, .6);
            transition: width .25s ease, height .25s ease, border-color .25s ease, background .25s ease;
        }

        #cursor-ring.hovering {
            width: 62px;
            height: 62px;
            background: rgba(230, 57, 70, .08);
            border-color: var(--accent);
        }

        @media (hover: none),
        (pointer: coarse) {

            #cursor-dot,
            #cursor-ring {
                display: none;
            }
        }

        /* ============ Navigation ============ */
        nav.site-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 900;
            transition: background .35s ease, border-color .35s ease, backdrop-filter .35s ease, box-shadow .35s ease;
            border-bottom: 1px solid transparent;
        }

        nav.site-nav.scrolled {
            background: rgba(7, 7, 9, .72);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom-color: var(--border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, .45);
        }

        .brand-mark {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            display: grid;
            place-items: center;
            font-weight: 900;
            color: #000;
            font-size: 15px;
            box-shadow: 0 0 18px var(--glow);
        }

        .nav-link {
            position: relative;
            color: var(--muted);
            text-transform: uppercase;
            font-size: 12.5px;
            letter-spacing: .12em;
            font-weight: 600;
            padding: 6px 2px;
            transition: color .3s ease;
        }

        .nav-link::after {
            content: "";
            position: absolute;
            bottom: 0;
            inset-inline-start: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            transition: width .3s ease;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--text);
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        .lang-btn {
            padding: 5px 13px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all .3s ease;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11.5px;
            border-radius: 999px;
            letter-spacing: .08em;
        }

        .lang-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #000;
            border-color: transparent;
            box-shadow: 0 0 14px var(--glow);
        }

        /* Full-screen mobile menu overlay */
        #mobile-menu {
            position: fixed;
            inset: 0;
            z-index: 899;
            background:
                radial-gradient(ellipse 70% 40% at 85% 8%, rgba(230, 57, 70, .12), transparent 60%),
                rgba(7, 7, 9, .985);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 100px 28px 44px;
            opacity: 0;
            visibility: hidden;
            transition: opacity .35s ease, visibility .35s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #mobile-menu.active {
            opacity: 1;
            visibility: visible;
        }

        .m-link {
            display: flex;
            align-items: baseline;
            gap: 16px;
            font-size: clamp(1.55rem, 7vw, 2.1rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .02em;
            color: var(--text);
            padding: 13px 0;
            border-bottom: 1px solid rgba(255, 255, 255, .06);
            opacity: 0;
            transform: translateY(24px);
            transition: opacity .5s cubic-bezier(.16, 1, .3, 1), transform .5s cubic-bezier(.16, 1, .3, 1), color .3s;
        }

        .m-link:last-child {
            border-bottom: 0;
        }

        .m-link:active {
            color: var(--accent);
        }

        .m-num {
            font-size: 12px;
            color: var(--accent);
            font-weight: 600;
        }

        #mobile-menu.active .m-link {
            opacity: 1;
            transform: none;
        }

        #mobile-menu.active .m-link:nth-child(1) { transition-delay: .05s }
        #mobile-menu.active .m-link:nth-child(2) { transition-delay: .10s }
        #mobile-menu.active .m-link:nth-child(3) { transition-delay: .15s }
        #mobile-menu.active .m-link:nth-child(4) { transition-delay: .20s }
        #mobile-menu.active .m-link:nth-child(5) { transition-delay: .25s }
        #mobile-menu.active .m-link:nth-child(6) { transition-delay: .30s }

        #mobileSocial {
            justify-content: center;
        }

        #mobileSocial a {
            width: 48px;
            height: 48px;
            display: grid;
            place-items: center;
            border: 1px solid var(--border);
            border-radius: 50%;
        }

        /* ============ Hero ============ */
        .hero {
            position: relative;
            min-height: 100svh;
            display: flex;
            align-items: center;
            overflow: hidden;
            background:
                radial-gradient(ellipse 60% 50% at 15% 10%, rgba(230, 57, 70, .10), transparent 60%),
                radial-gradient(ellipse 50% 45% at 90% 85%, rgba(255, 107, 84, .07), transparent 60%),
                var(--bg);
        }

        .hero-grid-bg {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, .035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, .035) 1px, transparent 1px);
            background-size: 56px 56px;
            mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 30%, transparent 75%);
            -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 30%, transparent 75%);
        }

        #particles {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .03);
            padding: 7px 16px;
            border-radius: 999px;
            font-size: 12.5px;
            font-weight: 600;
            letter-spacing: .05em;
            color: var(--muted);
        }

        .hero-badge .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ee36b;
            position: relative;
        }

        .hero-badge .pulse::after {
            content: "";
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px solid #2ee36b;
            animation: pulseRing 1.8s ease-out infinite;
        }

        @keyframes pulseRing {
            0% {
                transform: scale(.5);
                opacity: 1;
            }

            100% {
                transform: scale(1.6);
                opacity: 0;
            }
        }

        .typing-line {
            font-size: clamp(1rem, 2.2vw, 1.35rem);
            font-weight: 600;
            color: var(--muted);
            min-height: 1.8em;
        }

        .typing-text {
            color: var(--text);
        }

        .typing-caret {
            display: inline-block;
            width: 3px;
            height: 1.05em;
            vertical-align: text-bottom;
            background: var(--accent);
            margin-inline-start: 3px;
            animation: caretBlink .8s step-end infinite;
        }

        @keyframes caretBlink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* Buttons */
        .btn-primary {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #000;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            padding: 14px 32px;
            font-size: 13.5px;
            border-radius: 4px;
            overflow: hidden;
            transition: transform .3s ease, box-shadow .3s ease;
            box-shadow: 0 8px 30px var(--glow);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 40px var(--glow);
        }

        .btn-primary .shine {
            position: absolute;
            top: 0;
            left: -80%;
            width: 50%;
            height: 100%;
            background: linear-gradient(100deg, transparent, rgba(255, 255, 255, .45), transparent);
            transform: skewX(-20deg);
            animation: shineSweep 3.2s ease-in-out infinite;
        }

        @keyframes shineSweep {

            0%,
            60% {
                left: -80%;
            }

            100% {
                left: 130%;
            }
        }

        .btn-ghost {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border);
            color: var(--text);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
            padding: 14px 32px;
            font-size: 13.5px;
            border-radius: 4px;
            transition: all .3s ease;
            background: rgba(255, 255, 255, .02);
        }

        .btn-ghost:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, .4);
        }

        /* Stats */
        .stat-value {
            font-size: clamp(1.7rem, 3.4vw, 2.6rem);
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(120deg, var(--text), #b9bdc7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-suffix {
            color: var(--accent);
            -webkit-text-fill-color: var(--accent);
        }

        .stat-label {
            color: var(--muted);
            font-size: 12.5px;
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* Portrait */
        .hero-image-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-top: 130px;
        }

        .portrait-stage {
            position: relative;
            transition: transform .3s ease-out;
            will-change: transform;
        }

        .circle-face {
            display: inline-block;
            position: relative;
            border: 3px solid var(--accent);
            border-radius: 50%;
            width: 356px;
            height: 356px;
            z-index: 2;
            box-shadow: 0 0 60px var(--glow), inset 0 0 60px rgba(230, 57, 70, .12);
            flex-shrink: 0;
            background: radial-gradient(circle at 50% 30%, rgba(230, 57, 70, .12), transparent 70%);
        }

        .circle-face>span {
            position: absolute;
            transform: translateY(calc(-50% - 84px)) translateX(50%);
            top: 50%;
            right: 50%;
            width: 350px;
            height: 520px;
            background: none no-repeat center bottom / 350px;
            border-radius: 0 0 175px 175px;
            filter: drop-shadow(0 18px 30px rgba(0, 0, 0, .55));
        }

        .ring-dashed {
            position: absolute;
            inset: -26px;
            border-radius: 50%;
            border: 1.5px dashed rgba(230, 57, 70, .35);
            animation: spinSlow 26s linear infinite;
        }

        .ring-dashed-2 {
            position: absolute;
            inset: -48px;
            border-radius: 50%;
            border: 1px dashed rgba(255, 255, 255, .10);
            animation: spinSlow 40s linear infinite reverse;
        }

        @keyframes spinSlow {
            to {
                transform: rotate(360deg);
            }
        }

        .float-chip {
            position: absolute;
            z-index: 3;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(17, 17, 22, .88);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            padding: 9px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            box-shadow: 0 12px 30px rgba(0, 0, 0, .5);
            animation: floatY 5s ease-in-out infinite;
            white-space: nowrap;
        }

        .float-chip i {
            color: var(--accent);
        }

        @keyframes floatY {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-14px);
            }
        }

        .scroll-hint {
            position: absolute;
            bottom: 26px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 11px;
            letter-spacing: .25em;
            text-transform: uppercase;
            z-index: 4;
        }

        .scroll-hint .mouse {
            width: 24px;
            height: 38px;
            border: 1.5px solid var(--muted);
            border-radius: 14px;
            position: relative;
        }

        .scroll-hint .mouse::after {
            content: "";
            position: absolute;
            top: 7px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 7px;
            border-radius: 3px;
            background: var(--accent);
            animation: wheel 1.6s ease infinite;
        }

        @keyframes wheel {
            0% {
                opacity: 1;
                transform: translate(-50%, 0);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, 12px);
            }
        }

        /* ============ Sections ============ */
        .section-head {
            position: relative;
            text-align: center;
            margin-bottom: clamp(3rem, 6vw, 4.5rem);
        }

        .overline {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .3em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .overline::before,
        .overline::after {
            content: "";
            width: 28px;
            height: 1.5px;
            background: linear-gradient(90deg, transparent, var(--accent));
        }

        .overline::after {
            background: linear-gradient(90deg, var(--accent), transparent);
        }

        .section-title {
            font-size: clamp(1.7rem, 4.5vw, 3rem);
            font-weight: 800;
            line-height: 1.15;
        }

        .ghost-word {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, calc(-58% + var(--gp, 0px)));
            font-size: clamp(3.4rem, 12vw, 8.5rem);
            font-weight: 900;
            letter-spacing: .04em;
            text-transform: uppercase;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, .055);
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
            z-index: -1;
        }

        /* Feature cards */
        .feature-card {
            position: relative;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 30px 26px;
            overflow: hidden;
            transition: transform .4s cubic-bezier(.16, 1, .3, 1), border-color .4s, box-shadow .4s;
        }

        .feature-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(420px circle at var(--mx, 50%) var(--my, 50%), rgba(230, 57, 70, .10), transparent 45%);
            opacity: 0;
            transition: opacity .4s;
            pointer-events: none;
        }

        .feature-card:hover {
            transform: translateY(-8px);
            border-color: rgba(230, 57, 70, .45);
            box-shadow: 0 20px 50px rgba(0, 0, 0, .5), 0 0 30px rgba(230, 57, 70, .10);
        }

        .feature-card:hover::before {
            opacity: 1;
        }

        .feature-icon {
            width: 54px;
            height: 54px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            font-size: 22px;
            color: var(--accent);
            background: rgba(230, 57, 70, .10);
            border: 1px solid rgba(230, 57, 70, .25);
            margin-bottom: 18px;
            transition: all .4s ease;
        }

        .feature-card:hover .feature-icon {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #000;
            box-shadow: 0 0 25px var(--glow);
            transform: rotate(-6deg) scale(1.06);
        }

        /* Service cards */
        .service-card {
            position: relative;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 28px 24px;
            overflow: hidden;
            transition: transform .4s cubic-bezier(.16, 1, .3, 1), border-color .4s, box-shadow .4s;
        }

        .service-card .svc-num {
            position: absolute;
            top: 14px;
            inset-inline-end: 18px;
            font-size: 42px;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, .09);
            line-height: 1;
            transition: all .4s ease;
        }

        .service-card:hover {
            transform: translateY(-8px);
            border-color: rgba(230, 57, 70, .5);
            box-shadow: 0 20px 50px rgba(0, 0, 0, .5);
        }

        .service-card:hover .svc-num {
            -webkit-text-stroke-color: rgba(230, 57, 70, .5);
        }

        .service-card .svc-icon {
            font-size: 26px;
            color: var(--accent);
            margin-bottom: 16px;
            transition: transform .4s ease;
        }

        .service-card:hover .svc-icon {
            transform: scale(1.15);
        }

        .service-card::after {
            content: "";
            position: absolute;
            bottom: 0;
            inset-inline-start: 0;
            height: 3px;
            width: 0;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            transition: width .45s ease;
        }

        .service-card:hover::after {
            width: 100%;
        }

        /* ============ Marquee ============ */
        .marquee {
            overflow: hidden;
            direction: ltr;
            mask-image: linear-gradient(90deg, transparent, black 12%, black 88%, transparent);
            -webkit-mask-image: linear-gradient(90deg, transparent, black 12%, black 88%, transparent);
            padding: 8px 0;
        }

        .marquee-track {
            display: flex;
            gap: 14px;
            width: max-content;
            animation: marqueeMove 36s linear infinite;
        }

        .marquee-track.reverse {
            animation-direction: reverse;
        }

        .marquee:hover .marquee-track {
            animation-play-state: paused;
        }

        @keyframes marqueeMove {
            to {
                transform: translateX(-50%);
            }
        }

        .tech-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--muted);
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            transition: all .3s ease;
        }

        .tech-chip i {
            color: var(--accent);
            font-size: 9px;
        }

        .tech-chip:hover {
            border-color: var(--accent);
            color: var(--text);
            box-shadow: 0 0 18px rgba(230, 57, 70, .18);
            transform: translateY(-3px);
        }

        /* ============ Projects ============ */
        .project-card {
            position: relative;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: transform .45s cubic-bezier(.16, 1, .3, 1), border-color .45s, box-shadow .45s;
            transform-style: preserve-3d;
        }

        .project-card:hover {
            border-color: rgba(230, 57, 70, .55);
            box-shadow: 0 24px 60px rgba(0, 0, 0, .55), 0 0 40px rgba(230, 57, 70, .12);
        }

        .project-media {
            position: relative;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }

        .project-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .7s cubic-bezier(.16, 1, .3, 1), filter .5s;
        }

        .project-card:hover .project-media img {
            transform: scale(1.08);
        }

        .project-media::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 55%, rgba(7, 7, 9, .9));
            opacity: .85;
        }

        .project-arrow {
            position: absolute;
            top: 14px;
            inset-inline-end: 14px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #000;
            font-size: 15px;
            opacity: 0;
            transform: translateY(10px) rotate(-45deg);
            transition: all .4s ease;
            z-index: 2;
        }

        .project-card:hover .project-arrow {
            opacity: 1;
            transform: translateY(0) rotate(-45deg);
        }

        .project-info {
            padding: 22px;
        }

        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .project-tag {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px solid rgba(230, 57, 70, .35);
            background: rgba(230, 57, 70, .08);
            padding: 4px 12px;
            border-radius: 999px;
        }

        .project-title {
            font-size: 19px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .project-description {
            color: var(--muted);
            line-height: 1.65;
            font-size: 14px;
        }

        /* ============ Process timeline ============ */
        .process-grid {
            position: relative;
        }

        .process-card {
            position: relative;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 34px 24px 28px;
            text-align: center;
            transition: transform .4s cubic-bezier(.16, 1, .3, 1), border-color .4s, box-shadow .4s;
            z-index: 1;
        }

        .process-card:hover {
            transform: translateY(-8px);
            border-color: rgba(230, 57, 70, .5);
            box-shadow: 0 20px 50px rgba(0, 0, 0, .5);
        }

        .process-num {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-weight: 800;
            font-size: 17px;
            color: #000;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            box-shadow: 0 0 24px var(--glow);
        }

        .process-icon {
            font-size: 28px;
            color: var(--accent);
            margin: 10px 0 16px;
        }

        .process-connector {
            position: absolute;
            top: 0;
            left: 8%;
            right: 8%;
            height: 1.5px;
            background: linear-gradient(90deg, transparent, rgba(230, 57, 70, .4), rgba(230, 57, 70, .4), transparent);
            display: none;
        }

        @media (min-width: 1024px) {
            .process-connector {
                display: block;
            }
        }

        /* ============ Contact ============ */
        .contact-card {
            position: relative;
            border-radius: 22px;
            padding: 2px;
            background: linear-gradient(var(--bg-2), var(--bg-2)) padding-box,
                conic-gradient(from var(--ang, 0deg), var(--accent), transparent 30%, transparent 70%, var(--accent-2)) border-box;
            border: 2px solid transparent;
            animation: rotateBorder 5s linear infinite;
        }

        @property --ang {
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes rotateBorder {
            to {
                --ang: 360deg;
            }
        }

        .contact-inner {
            border-radius: 20px;
            background:
                radial-gradient(ellipse 60% 80% at 50% 0%, rgba(230, 57, 70, .10), transparent 60%),
                var(--bg-2);
            padding: clamp(3rem, 7vw, 5.5rem) clamp(1.5rem, 5vw, 4rem);
            text-align: center;
        }

        /* ============ Reveal animations ============ */
        .reveal {
            opacity: 0;
            transform: translateY(42px);
            transition: opacity .8s cubic-bezier(.16, 1, .3, 1), transform .8s cubic-bezier(.16, 1, .3, 1);
            transition-delay: var(--d, 0s);
        }

        .reveal.visible {
            opacity: 1;
            transform: none;
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: .01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: .01ms !important;
            }

            .reveal {
                opacity: 1;
                transform: none;
            }
        }

        /* ============ Back to top ============ */
        #back-to-top {
            position: fixed;
            bottom: 26px;
            inset-inline-end: 26px;
            width: 46px;
            height: 46px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--accent);
            font-size: 16px;
            cursor: pointer;
            z-index: 900;
            opacity: 0;
            visibility: hidden;
            transform: translateY(12px);
            transition: all .35s ease;
        }

        #back-to-top.show {
            opacity: 1;
            visibility: visible;
            transform: none;
        }

        #back-to-top:hover {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #000;
            box-shadow: 0 0 24px var(--glow);
        }

        /* ============ Responsive portrait ============ */
        .chip-1 {
            top: 6%;
            inset-inline-start: -24%;
        }

        .chip-2 {
            top: 44%;
            inset-inline-end: -30%;
        }

        .chip-3 {
            bottom: 2%;
            inset-inline-start: -18%;
        }

        @media (max-width: 1100px) and (min-width: 769px) {
            .float-chip {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .float-chip {
                padding: 6px 11px;
                font-size: 11px;
                border-radius: 8px;
                gap: 6px;
            }

            .chip-1 {
                top: 2%;
                inset-inline-start: -42px;
            }

            .chip-2 {
                top: auto;
                bottom: 8%;
                inset-inline-end: -46px;
            }

            .chip-3 {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .hero-image-wrapper {
                margin-top: 88px;
                margin-bottom: 4px;
            }

            .circle-face {
                width: 250px;
                height: 250px;
                border-width: 2px;
            }

            .circle-face>span {
                width: 250px;
                height: 380px;
                background-size: 250px !important;
                border-radius: 0 0 125px 125px;
                transform: translateY(calc(-50% - 44px)) translateX(50%);
            }

            .ring-dashed {
                inset: -18px;
            }

            .ring-dashed-2 {
                inset: -34px;
            }

            .scroll-hint {
                display: none;
            }
        }

        @media (max-width: 640px) {
            .hero-image-wrapper {
                margin-top: 58px;
            }

            .circle-face {
                width: 210px;
                height: 210px;
            }

            .circle-face>span {
                width: 210px;
                height: 315px;
                background-size: 210px !important;
                border-radius: 0 0 105px 105px;
                transform: translateY(calc(-50% - 26px)) translateX(50%);
            }
        }

        /* ============ Anchor offset under fixed nav ============ */
        header[id],
        section[id] {
            scroll-margin-top: 78px;
        }

        /* ============ Mobile dock (app-style bottom nav) ============ */
        #mobile-dock {
            position: fixed;
            bottom: 14px;
            left: 14px;
            right: 14px;
            z-index: 901;
            background: rgba(14, 14, 19, .82);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, .55);
            padding: 7px 6px;
            transition: transform .35s ease, opacity .35s ease;
        }

        #mobile-dock.dock-hidden {
            transform: translateY(130%);
            opacity: 0;
        }

        #dockItems {
            display: flex;
            justify-content: space-around;
            align-items: stretch;
        }

        .dock-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 7px 2px 6px;
            border-radius: 14px;
            color: var(--muted);
            font-size: 9.5px;
            font-weight: 700;
            letter-spacing: .04em;
            text-transform: uppercase;
            transition: color .3s ease, background .3s ease, transform .15s ease;
            min-width: 0;
        }

        .dock-item:active {
            transform: scale(.9);
        }

        .dock-ico {
            font-size: 15px;
            height: 20px;
            display: grid;
            place-items: center;
            transition: transform .3s ease;
        }

        .dock-item.active {
            color: var(--accent);
            background: rgba(230, 57, 70, .10);
        }

        .dock-item.active .dock-ico {
            transform: translateY(-1px) scale(1.12);
        }

        .dock-cta {
            color: var(--text);
        }

        .dock-cta .dock-ico {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #000;
            font-size: 13px;
            box-shadow: 0 0 16px var(--glow);
        }

        .dock-label {
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @media (max-width: 767px) {
            #back-to-top {
                bottom: 96px;
                inset-inline-end: 18px;
            }

            footer {
                padding-bottom: 112px !important;
            }
        }

        /* ============ Mobile project carousel ============ */
        #projectDots {
            display: none;
        }

        @media (max-width: 639px) {
            #projectsGrid {
                display: flex;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                gap: 16px;
                margin: 0 -16px;
                padding: 6px 34px 10px;
                scrollbar-width: none;
            }

            #projectsGrid::-webkit-scrollbar {
                display: none;
            }

            #projectsGrid .project-card {
                flex: 0 0 84%;
                scroll-snap-align: center;
            }

            #projectDots {
                display: flex;
                justify-content: center;
                gap: 8px;
                margin-top: 20px;
            }

            .proj-dot {
                width: 8px;
                height: 8px;
                border-radius: 999px;
                background: #3a3a44;
                transition: all .3s ease;
                cursor: pointer;
            }

            .proj-dot.active {
                width: 26px;
                background: linear-gradient(90deg, var(--accent), var(--accent-2));
                box-shadow: 0 0 10px var(--glow);
            }
        }

        /* ============ Touch devices: center-scroll "hover" + press feedback ============ */
        @media (hover: none) {
            .feature-card.touch-active {
                transform: translateY(-4px);
                border-color: rgba(230, 57, 70, .45);
                box-shadow: 0 16px 40px rgba(0, 0, 0, .5), 0 0 26px rgba(230, 57, 70, .10);
            }

            .feature-card.touch-active::before {
                opacity: 1;
                --mx: 50%;
                --my: 0%;
            }

            .feature-card.touch-active .feature-icon {
                background: linear-gradient(135deg, var(--accent), var(--accent-2));
                color: #000;
                box-shadow: 0 0 22px var(--glow);
                transform: rotate(-6deg) scale(1.05);
            }

            .service-card.touch-active {
                border-color: rgba(230, 57, 70, .5);
            }

            .service-card.touch-active::after {
                width: 100%;
            }

            .service-card.touch-active .svc-num {
                -webkit-text-stroke-color: rgba(230, 57, 70, .5);
            }

            .service-card.touch-active .svc-icon {
                transform: scale(1.12);
            }

            .process-card.touch-active {
                border-color: rgba(230, 57, 70, .5);
                transform: translateY(-4px);
            }

            .project-card.touch-active {
                border-color: rgba(230, 57, 70, .55);
                box-shadow: 0 18px 46px rgba(0, 0, 0, .5), 0 0 30px rgba(230, 57, 70, .12);
            }

            .project-card.touch-active .project-media img {
                transform: scale(1.07);
            }

            .project-card.touch-active .project-arrow {
                opacity: 1;
                transform: translateY(0) rotate(-45deg);
            }

            .btn-primary:active,
            .btn-ghost:active {
                transform: scale(.96);
            }

            .tech-chip:active {
                border-color: var(--accent);
                color: var(--text);
            }
        }
    </style>
</head>

                    <div class="ghost-word" id="portfolioGhost"></div>
                    <div class="overline" id="portfolioOverline"></div>
                    <h2 class="section-title"><span id="myText"></span> <span class="red" id="portfolioText"></span></h2>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-7" id="projectsGrid"></div>
                <div id="projectDots" aria-hidden="true"></div>
            </div>
        </section>

        <!-- Process -->
        <section id="process" class="py-20 md:py-28 w-full" style="background: var(--bg-2)">
            <div class="px-4 sm:px-6 lg:px-10 max-w-[1400px] mx-auto">
                <div class="section-head reveal">
                    <div class="ghost-word" id="processGhost"></div>
                    <div class="overline" id="processOverline"></div>
                    <h2 class="section-title"><span id="myWorkingText"></span> <span class="red" id="processText"></span></h2>
                </div>
                <div class="process-grid grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-7 lg:gap-6 pt-6" id="processGrid">
                </div>
            </div>
        </section>

        <!-- Contact -->
        <section id="contact" class="py-20 md:py-28 w-full" style="background: var(--bg)">
            <div class="px-4 sm:px-6 lg:px-10 max-w-[1100px] mx-auto">
                <div class="contact-card reveal">
                    <div class="contact-inner">
                        <h2 class="section-title mb-5" id="contactTitle"></h2>
                        <p class="text-[16px] md:text-lg mb-9 max-w-xl mx-auto" style="color: var(--muted)" id="contactDesc"></p>
                        <a href="#" id="contactBtn" target="_blank" rel="noopener" class="btn-primary magnetic"><span
                                class="shine"></span><i class="fas fa-paper-plane"></i><span id="contactBtnText"></span></a>
                        <div class="flex justify-center gap-5 mt-9" id="contactSocial"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="py-10 px-4 text-center w-full border-t" style="background: var(--bg-2); border-color: var(--border)">
        <p class="mb-5 text-sm" style="color: var(--muted)" id="footerText"></p>
        <div class="flex justify-center gap-6" id="footerSocial"></div>
    </footer>

    <!-- Mobile dock -->
    <nav id="mobile-dock" class="md:hidden" aria-label="Quick navigation">
        <div id="dockItems"></div>
    </nav>

    <!-- Back to top -->
    <button id="back-to-top" aria-label="Back to top"><i class="fas fa-arrow-up"></i></button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script>
        (function () {
            'use strict';

            const state = {
                data: null,
                lang: localStorage.getItem('lang') || 'en',
                typingToken: 0
            };
            const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const finePointer = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
            const qs = (s, el) => (el || document).querySelector(s);
            const qsa = (s, el) => Array.from((el || document).querySelectorAll(s));

            /* ============ Preloader ============ */
            const NAME = 'BEGHDAD AMINE';
            qs('#loaderName').innerHTML = NAME.split('').map((ch, i) =>
                `<span style="animation-delay:${i * 55}ms">${ch === ' ' ? '&nbsp;' : ch}</span>`).join('');

            let preloaderHidden = false;
            function hidePreloader() {
                if (preloaderHidden) return;
                preloaderHidden = true;
                qs('#preloader').classList.add('hidden');
            }
            setTimeout(hidePreloader, 3200); // safety net

            /* ============ Data loading ============ */
            fetch('data.json')
                .then(r => r.json())
                .then(d => {
                    state.data = d;
                    init();
                    setTimeout(hidePreloader, 900);
                })
                .catch(err => {
                    console.error('Error loading portfolio data:', err);
                    hidePreloader();
                });

            const content = () => state.data[state.lang];

            /* ============ Renderers ============ */
            function socialLink(s, cls) {
                return `<a href="${s.href}" target="_blank" rel="noopener" aria-label="${s.name}" class="${cls}"><i class="${s.icon}"></i></a>`;
            }

            function renderNav() {
                const c = content();
                qs('#navLinks').innerHTML = c.navLinks.map(l =>
                    `<a href="${l.href}" class="nav-link" data-spy="${l.href}">${l.name}</a>`).join('');
                qs('#mobileLinks').innerHTML = c.navLinks.map((l, i) =>
                    `<a href="${l.href}" class="m-link"><span class="m-num mono">0${i + 1}</span>${l.name}</a>`).join('');
                qs('#navSocial').innerHTML = c.social.map(s =>
                    socialLink(s, 'text-[17px] transition hover:scale-110 hover:text-[#e63946] text-[#9aa0ab]')).join('');
                qs('#mobileSocial').innerHTML = c.social.map(s =>
                    socialLink(s, 'text-xl text-[#9aa0ab] hover:text-[#e63946] transition')).join('');
                renderDock(c);
            }

            const DOCK_ICONS = {
                '#features': 'fa-bolt',
                '#services': 'fa-layer-group',
                '#portfolio': 'fa-briefcase',
                '#contact': 'fa-paper-plane'
            };

            function renderDock(c) {
                const home = { href: '#home', name: state.lang === 'ar' ? 'الرئيسية' : 'Home' };
                const items = [home, ...c.navLinks.filter(l => DOCK_ICONS[l.href])];
                qs('#dockItems').innerHTML = items.map(it => `
                    <a href="${it.href === '#home' ? '#' : it.href}" class="dock-item${it.href === '#contact' ? ' dock-cta' : ''}" data-spy="${it.href}">
                        <span class="dock-ico"><i class="fas ${it.href === '#home' ? 'fa-house' : DOCK_ICONS[it.href]}"></i></span>
                        <span class="dock-label">${it.name}</span>
                    </a>`).join('');
                qsa('.dock-item').forEach(a => a.addEventListener('click', () => vibrate()));
            }

            function vibrate() {
                if (navigator.vibrate) navigator.vibrate(8);
            }

            function renderHero() {
                const c = content();
                qs('#heroBadgeText').textContent = c.hero.badge || '';
                qs('#heroTitle').innerHTML = c.hero.title;
                qs('#rolesPrefix').textContent = (c.hero.rolesPrefix || '') + ' ';
                qs('#heroDesc').textContent = c.hero.description;
                qs('#heroBtn').href = c.hero.buttonLink;
                qs('#heroBtnText').textContent = c.hero.buttonText;
                qs('#heroBtn2Text').textContent = c.hero.secondaryBtnText || '';
                qs('#scrollHintText').textContent = state.lang === 'ar' ? 'مرر' : 'Scroll';
                qs('#statsRow').innerHTML = (c.stats || []).map(s => `
                    <div>
                        <div class="stat-value"><span class="stat-num" data-target="${s.value}">0</span><span class="stat-suffix">${s.suffix || ''}</span></div>
                        <div class="stat-label">${s.label}</div>
                    </div>`).join('');
            }

            function renderSectionTitles() {
                const t = content().sectionTitles;
                qs('#whyChooseText').textContent = t.whyChoose;
                qs('#meText').textContent = t.me;
                qs('#whatSpecializeText').textContent = t.whatSpecialize;
                qs('#specializeText').textContent = t.specialize;
                qs('#technologyText').textContent = t.technology;
                qs('#stackText').textContent = t.stack;
                qs('#myText').textContent = t.my;
                qs('#portfolioText').textContent = t.portfolio;
                qs('#myWorkingText').textContent = t.myWorking;
                qs('#processText').textContent = t.process;
                qs('#featuresOverline').textContent = t.featuresOverline || '';
                qs('#servicesOverline').textContent = t.servicesOverline || '';
                qs('#stackOverline').textContent = t.stackOverline || '';
                qs('#portfolioOverline').textContent = t.portfolioOverline || '';
                qs('#processOverline').textContent = t.processOverline || '';
                // Ghost words behind headings (always latin, part of the visual identity)
                qs('#featuresGhost').textContent = 'About';
                qs('#servicesGhost').textContent = 'Services';
                qs('#stackGhost').textContent = 'Stack';
                qs('#portfolioGhost').textContent = 'Work';
                qs('#processGhost').textContent = 'Process';
            }

            function renderFeatures() {
                qs('#featuresGrid').innerHTML = content().features.map((f, i) => `
                    <div class="feature-card reveal" style="--d:${i * 0.08}s">
                        <div class="feature-icon"><i class="fas ${f.icon}"></i></div>
                        <h3 class="text-lg font-bold mb-2.5">${f.title}</h3>
                        <p class="text-sm leading-relaxed" style="color: var(--muted)">${f.description}</p>
                    </div>`).join('');
            }

            function renderServices() {
                qs('#servicesGrid').innerHTML = content().services.map((s, i) => `
                    <div class="service-card reveal" style="--d:${(i % 3) * 0.08}s">
                        <span class="svc-num">${String(i + 1).padStart(2, '0')}</span>
                        <div class="svc-icon"><i class="fas ${s.icon}"></i></div>
                        <h3 class="text-lg font-bold mb-2.5">${s.title}</h3>
                        <p class="text-sm leading-relaxed" style="color: var(--muted)">${s.description}</p>
                    </div>`).join('');
            }

            function renderMarquee() {
                const tech = content().technologies;
                const chip = t => `<span class="tech-chip"><i class="fas fa-circle"></i>${t}</span>`;
                const half = Math.ceil(tech.length / 2);
                const row1 = tech.slice(0, half), row2 = tech.slice(half);
                // duplicate content so the -50% translate loops seamlessly
                qs('#marqueeRow1').innerHTML = row1.map(chip).join('') + row1.map(chip).join('');
                qs('#marqueeRow2').innerHTML = row2.map(chip).join('') + row2.map(chip).join('');
            }

            function renderProjects() {
                const grid = qs('#projectsGrid');
                grid.innerHTML = content().portfolio.map((p, i) => `
                    <article class="project-card reveal tilt-card" style="--d:${(i % 3) * 0.1}s">
                        <div class="project-media">
                            <img src="${p.image}" alt="${p.title}" loading="lazy">
                            <div class="project-arrow"><i class="fas fa-arrow-right"></i></div>
                        </div>
                        <div class="project-info">
                            ${p.tags ? `<div class="project-tags">${p.tags.map(t => `<span class="project-tag">${t}</span>`).join('')}</div>` : ''}
                            <h3 class="project-title">${p.title}</h3>
                            <p class="project-description">${p.description}</p>
                        </div>
                    </article>`).join('');

                // Swipe dots (mobile carousel)
                const dots = qs('#projectDots');
                dots.innerHTML = content().portfolio.map((_, i) =>
                    `<span class="proj-dot${i === 0 ? ' active' : ''}" data-i="${i}"></span>`).join('');
                qsa('.proj-dot').forEach(d => d.addEventListener('click', () => {
                    grid.children[+d.dataset.i].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                }));
                let dotTimer;
                grid.onscroll = () => {
                    clearTimeout(dotTimer);
                    dotTimer = setTimeout(() => {
                        const step = grid.children[0].offsetWidth + 16;
                        const i = Math.min(Math.round(Math.abs(grid.scrollLeft) / step), grid.children.length - 1);
                        qsa('.proj-dot').forEach((d, k) => d.classList.toggle('active', k === i));
                    }, 80);
                };
            }

            function renderProcess() {
                const grid = qs('#processGrid');
                grid.innerHTML = '<div class="process-connector"></div>' + content().process.map((s, i) => `
                    <div class="process-card reveal" style="--d:${i * 0.12}s">
                        <div class="process-num">${s.number}</div>
                        <div class="process-icon"><i class="fas ${s.icon}"></i></div>
                        <h3 class="text-lg font-bold mb-2">${s.title}</h3>
                        <p class="text-sm" style="color: var(--muted)">${s.description}</p>
                    </div>`).join('');
            }

            function renderContact() {
                const c = content();
                qs('#contactTitle').innerHTML = c.contact.title;
                qs('#contactDesc').textContent = c.contact.description;
                qs('#contactBtn').href = c.contact.buttonLink;
                qs('#contactBtnText').textContent = c.contact.buttonText;
                qs('#contactSocial').innerHTML = c.social.map(s =>
                    socialLink(s, 'w-11 h-11 grid place-items-center rounded-full border border-[rgba(255,255,255,.12)] text-[#9aa0ab] hover:text-black hover:bg-[#e63946] hover:border-transparent hover:shadow-[0_0_20px_rgba(230,57,70,.4)] transition text-[17px]')).join('');
            }

            function renderFooter() {
                const c = content();
                qs('#footerText').innerHTML = c.footer.text;
                qs('#footerSocial').innerHTML = c.social.map(s =>
                    socialLink(s, 'text-[#9aa0ab] hover:text-[#e63946] transition text-lg hover:scale-110')).join('');
            }

            /* ============ Typing effect ============ */
            function startTyping() {
                const roles = content().hero.roles || [];
                const el = qs('#typingText');
                const token = ++state.typingToken;
                if (!roles.length) { el.textContent = ''; return; }
                if (reducedMotion) { el.textContent = roles[0]; return; }

                let roleIdx = 0, charIdx = 0, deleting = false;
                (function tick() {
                    if (token !== state.typingToken) return;
                    const word = roles[roleIdx];
                    charIdx += deleting ? -1 : 1;
                    el.textContent = word.slice(0, charIdx);
                    let delay = deleting ? 34 : 74;
                    if (!deleting && charIdx === word.length) { deleting = true; delay = 1900; }
                    else if (deleting && charIdx === 0) { deleting = false; roleIdx = (roleIdx + 1) % roles.length; delay = 420; }
                    setTimeout(tick, delay);
                })();
            }

            /* ============ Reveal on scroll ============ */
            let revealObserver = null;
            function setupReveals() {
                if (revealObserver) revealObserver.disconnect();
                revealObserver = new IntersectionObserver(entries => {
                    entries.forEach(e => {
                        if (e.isIntersecting) {
                            e.target.classList.add('visible');
                            revealObserver.unobserve(e.target);
                        }
                    });
                }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
                qsa('.reveal').forEach(el => {
                    if (el.classList.contains('visible')) return;
                    revealObserver.observe(el);
                });
            }

            /* ============ Animated counters ============ */
            let counterObserver = null;
            function setupCounters() {
                if (counterObserver) counterObserver.disconnect();
                counterObserver = new IntersectionObserver(entries => {
                    entries.forEach(e => {
                        if (!e.isIntersecting) return;
                        counterObserver.unobserve(e.target);
                        const target = parseInt(e.target.dataset.target, 10) || 0;
                        if (reducedMotion) { e.target.textContent = target; return; }
                        const dur = 1400, t0 = performance.now();
                        (function step(t) {
                            const p = Math.min((t - t0) / dur, 1);
                            e.target.textContent = Math.round(target * (1 - Math.pow(1 - p, 3)));
                            if (p < 1) requestAnimationFrame(step);
                        })(t0);
                    });
                }, { threshold: 0.5 });
                qsa('.stat-num').forEach(el => counterObserver.observe(el));
            }

            /* ============ Tilt cards ============ */
            function setupTilt() {
                if (!finePointer || reducedMotion || !window.VanillaTilt) return;
                VanillaTilt.init(qsa('.tilt-card'), {
                    max: 7, speed: 800, glare: true, 'max-glare': 0.12, scale: 1.015, gyroscope: false
                });
            }

            /* ============ Touch devices: activate card effects near screen center ============ */
            let touchObsVert = null, touchObsCarousel = null;
            function setupTouchActive() {
                if (finePointer) return;
                if (touchObsVert) touchObsVert.disconnect();
                if (touchObsCarousel) touchObsCarousel.disconnect();
                touchObsVert = new IntersectionObserver(es => es.forEach(e =>
                    e.target.classList.toggle('touch-active', e.isIntersecting)),
                    { rootMargin: '-42% 0px -42% 0px' });
                qsa('.feature-card, .service-card, .process-card').forEach(el => touchObsVert.observe(el));
                touchObsCarousel = new IntersectionObserver(es => es.forEach(e =>
                    e.target.classList.toggle('touch-active', e.isIntersecting && e.intersectionRatio > 0.7)),
                    { threshold: [0.5, 0.75] });
                qsa('.project-card').forEach(el => touchObsCarousel.observe(el));
            }

            /* ============ Gyroscope parallax (mobile) ============ */
            function setupGyro() {
                if (finePointer || reducedMotion) return;
                const stage = qs('.portrait-stage');
                if (!stage) return;
                let ticking = false;
                window.addEventListener('deviceorientation', e => {
                    if (e.beta == null || e.gamma == null) return;
                    const gx = Math.max(-1, Math.min(1, e.gamma / 30));
                    const gy = Math.max(-1, Math.min(1, (e.beta - 45) / 30));
                    if (!ticking) {
                        ticking = true;
                        requestAnimationFrame(() => {
                            stage.style.transform = `translate(${gx * 10}px, ${gy * 8}px)`;
                            ticking = false;
                        });
                    }
                }, { passive: true });
            }

            /* ============ Desktop mouse parallax on the portrait ============ */
            function setupHeroParallax() {
                if (!finePointer || reducedMotion) return;
                const hero = qs('.hero'), stage = qs('.portrait-stage');
                hero.addEventListener('mousemove', e => {
                    const r = hero.getBoundingClientRect();
                    const dx = (e.clientX - r.left) / r.width - .5;
                    const dy = (e.clientY - r.top) / r.height - .5;
                    stage.style.transform = `translate(${dx * 16}px, ${dy * 12}px)`;
                }, { passive: true });
                hero.addEventListener('mouseleave', () => { stage.style.transform = ''; });
            }

            /* ============ Ghost words scroll parallax ============ */
            function setupGhostParallax() {
                const ghosts = qsa('.ghost-word');
                if (!ghosts.length || reducedMotion) return;
                const update = () => requestAnimationFrame(() => ghosts.forEach(g => {
                    const r = g.parentElement.getBoundingClientRect();
                    const p = (r.top + r.height / 2 - innerHeight / 2) / innerHeight;
                    g.style.setProperty('--gp', (p * 60) + 'px');
                }));
                window.addEventListener('scroll', update, { passive: true });
                update();
            }

            /* ============ Spotlight hover on feature cards ============ */
            function setupSpotlight() {
                qsa('.feature-card').forEach(card => {
                    card.addEventListener('mousemove', e => {
                        const r = card.getBoundingClientRect();
                        card.style.setProperty('--mx', (e.clientX - r.left) + 'px');
                        card.style.setProperty('--my', (e.clientY - r.top) + 'px');
                    });
                });
            }

            /* ============ Language ============ */
            function setLanguage(lang) {
                state.lang = lang;
                localStorage.setItem('lang', lang);
                document.documentElement.lang = lang;
                document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
                qsa('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
                renderAll();
            }

            function renderAll() {
                renderNav();
                renderHero();
                renderSectionTitles();
                renderFeatures();
                renderServices();
                renderMarquee();
                renderProjects();
                renderProcess();
                renderContact();
                renderFooter();
                startTyping();
                setupReveals();
                setupCounters();
                setupTilt();
                setupSpotlight();
                setupTouchActive();
                bindMobileLinkClose();
            }

            /* ============ Nav behaviors ============ */
            function closeMobileMenu() {
                qs('#mobile-menu').classList.remove('active');
                qs('#menu-toggle i').className = 'fas fa-bars';
                document.documentElement.style.overflow = '';
                qs('#mobile-dock').classList.remove('dock-hidden');
            }

            function bindMobileLinkClose() {
                qsa('#mobileLinks a').forEach(a =>
                    a.addEventListener('click', () => { vibrate(); closeMobileMenu(); }));
            }

            function setupNav() {
                const nav = qs('nav.site-nav');
                const onScroll = () => nav.classList.toggle('scrolled', window.scrollY > 24);
                window.addEventListener('scroll', onScroll, { passive: true });
                onScroll();

                qs('#menu-toggle').addEventListener('click', () => {
                    vibrate();
                    const menu = qs('#mobile-menu');
                    const open = !menu.classList.contains('active');
                    if (open) {
                        menu.classList.add('active');
                        qs('#menu-toggle i').className = 'fas fa-xmark';
                        document.documentElement.style.overflow = 'hidden';
                        qs('#mobile-dock').classList.add('dock-hidden');
                    } else {
                        closeMobileMenu();
                    }
                });

                // Scrollspy — nav links + mobile dock
                const spy = new IntersectionObserver(entries => {
                    entries.forEach(e => {
                        if (!e.isIntersecting) return;
                        qsa('#navLinks .nav-link, .dock-item').forEach(l =>
                            l.classList.toggle('active', l.dataset.spy === '#' + e.target.id));
                    });
                }, { rootMargin: '-40% 0px -55% 0px' });
                qsa('header[id], main section[id]').forEach(s => spy.observe(s));
            }

            /* ============ Scroll progress + back-to-top ============ */
            function setupScrollUi() {
                const bar = qs('#scroll-progress');
                const btt = qs('#back-to-top');
                window.addEventListener('scroll', () => {
                    const h = document.documentElement;
                    const max = h.scrollHeight - h.clientHeight;
                    bar.style.width = (max > 0 ? (h.scrollTop / max) * 100 : 0) + '%';
                    btt.classList.toggle('show', h.scrollTop > 600);
                }, { passive: true });
                btt.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
            }

            /* ============ Custom cursor ============ */
            function setupCursor() {
                if (!finePointer || reducedMotion) return;
                const dot = qs('#cursor-dot'), ring = qs('#cursor-ring');
                let mx = -100, my = -100, rx = -100, ry = -100;
                document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; }, { passive: true });
                (function loop() {
                    rx += (mx - rx) * 0.16;
                    ry += (my - ry) * 0.16;
                    dot.style.transform = `translate(${mx}px,${my}px) translate(-50%,-50%)`;
                    ring.style.transform = `translate(${rx}px,${ry}px) translate(-50%,-50%)`;
                    requestAnimationFrame(loop);
                })();
                document.addEventListener('mouseover', e => {
                    ring.classList.toggle('hovering', !!e.target.closest('a, button, .tilt-card, .lang-btn'));
                });
            }

            /* ============ Magnetic buttons ============ */
            function setupMagnetic() {
                if (!finePointer || reducedMotion) return;
                document.addEventListener('mousemove', e => {
                    qsa('.magnetic').forEach(el => {
                        const r = el.getBoundingClientRect();
                        const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
                        const dx = e.clientX - cx, dy = e.clientY - cy;
                        const dist = Math.hypot(dx, dy);
                        if (dist < 130) {
                            const pull = (130 - dist) / 130;
                            el.style.transform = `translate(${dx * pull * .22}px, ${dy * pull * .22}px)`;
                        } else {
                            el.style.transform = '';
                        }
                    });
                }, { passive: true });
            }

            /* ============ Particle network (hero) ============ */
            function setupParticles() {
                if (reducedMotion) return;
                const canvas = qs('#particles');
                const ctx = canvas.getContext('2d');
                const hero = qs('.hero');
                let W, H, parts = [], mouse = { x: -9999, y: -9999 };

                function resize() {
                    W = canvas.width = hero.clientWidth;
                    H = canvas.height = hero.clientHeight;
                    const count = Math.min(90, Math.floor(W * H / 22000));
                    parts = Array.from({ length: count }, () => ({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        vx: (Math.random() - .5) * .35,
                        vy: (Math.random() - .5) * .35,
                        r: Math.random() * 1.6 + .5
                    }));
                }
                resize();
                window.addEventListener('resize', resize, { passive: true });
                hero.addEventListener('mousemove', e => {
                    const r = hero.getBoundingClientRect();
                    mouse.x = e.clientX - r.left;
                    mouse.y = e.clientY - r.top;
                }, { passive: true });
                hero.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });

                (function draw() {
                    ctx.clearRect(0, 0, W, H);
                    for (const p of parts) {
                        p.x += p.vx; p.y += p.vy;
                        if (p.x < 0 || p.x > W) p.vx *= -1;
                        if (p.y < 0 || p.y > H) p.vy *= -1;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(230,57,70,.5)';
                        ctx.fill();
                    }
                    for (let i = 0; i < parts.length; i++) {
                        for (let j = i + 1; j < parts.length; j++) {
                            const a = parts[i], b = parts[j];
                            const d = Math.hypot(a.x - b.x, a.y - b.y);
                            if (d < 130) {
                                ctx.beginPath();
                                ctx.moveTo(a.x, a.y);
                                ctx.lineTo(b.x, b.y);
                                ctx.strokeStyle = `rgba(230,57,70,${(1 - d / 130) * .16})`;
                                ctx.lineWidth = 1;
                                ctx.stroke();
                            }
                        }
                        const dm = Math.hypot(parts[i].x - mouse.x, parts[i].y - mouse.y);
                        if (dm < 170) {
                            ctx.beginPath();
                            ctx.moveTo(parts[i].x, parts[i].y);
                            ctx.lineTo(mouse.x, mouse.y);
                            ctx.strokeStyle = `rgba(255,107,84,${(1 - dm / 170) * .28})`;
                            ctx.lineWidth = 1;
                            ctx.stroke();
                        }
                    }
                    requestAnimationFrame(draw);
                })();
            }

            /* ============ Init ============ */
            function init() {
                document.documentElement.lang = state.lang;
                document.documentElement.dir = state.lang === 'ar' ? 'rtl' : 'ltr';
                qsa('.lang-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.lang === state.lang);
                    b.addEventListener('click', () => {
                        if (b.dataset.lang !== state.lang) { vibrate(); setLanguage(b.dataset.lang); }
                    });
                });
                renderAll();
                setupNav();
                setupScrollUi();
                setupCursor();
                setupMagnetic();
                setupParticles();
                setupGyro();
                setupHeroParallax();
                setupGhostParallax();
            }
        })();
    </script>
</body>

</html>
